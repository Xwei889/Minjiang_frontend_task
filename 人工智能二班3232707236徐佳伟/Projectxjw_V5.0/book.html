<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教材</title>
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="./css/book.css">
</head>
<body>
    <h3>教材展示</h3>

    <div class="book-container">
        <!-- 计算机组成原理 -->
        <div class="course-box">
            <h4>计算机组成原理</h4>
            <div class="tag">教材</div>
            <div class="book-item">
                <img src="./images/computer.jpg" alt="计算机组成原理教材">
            </div>
            <div class="tag">参考书</div>
            <div class="book-item row">
                <img src="./images/computer2.jpg" alt="参考书1">
                <img src="./images/computer3.jpg" alt="参考书2">
            </div>
        </div>

        <!-- Java语言课程设计 -->
        <div class="course-box">
            <h4>Java语言课程设计</h4>
            <div class="tag">教材</div>
            <div class="book-item">

        </div>

        <!-- 数据库原理与应用 -->
        <div class="course-box">
            <h4>数据库原理与应用</h4>
            <div class="tag">教材</div>
            <div class="book-item">
                <img src="./images/database.jpg" alt="数据库教材">
            </div>
        </div>

        <!-- 离散数学 -->
        <div class="course-box">
            <h4>离散数学</h4>

            <div class="book-item">
                <img src="./images/DiscreteMath.jpg" alt="离散数学教材">
            </div>
        </div>

        <!-- Web技术基础 -->
        <div class="course-box">
            <h4>Web技术基础</h4>
            <div class="tag">教材</div>
            <div class="book-item">
                <img src="./images/web.jpg" alt="Web技术教材">
            </div>
            <div class="tag">参考书</div>
            <div class="book-item">
                <img src="./images/Web2.jpg" alt="Web技术参考书">
            </div>
        </div>
