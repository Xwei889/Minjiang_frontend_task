<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据图表</title>
    <link rel="stylesheet" href="./css/common.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            background-color: #f5f7fa;
        }

        h3 {
            text-align: center;
            margin: 25px 0;
            font-size: 24px;
            color: #667eea;
            position: relative;
        }

        h3::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 10px auto 0;
            border-radius: 2px;
        }

        .charts-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 0 20px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .chart-card {
            width: 48%;
            max-width: 550px;
            min-width: 400px;
            border: none;
            border-radius: 12px;
            padding: 20px;
            background: #fff;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease both;
        }

        .chart-card:nth-child(1) { animation-delay: 0.1s; }
        .chart-card:nth-child(2) { animation-delay: 0.2s; }
        .chart-card:nth-child(3) { animation-delay: 0.3s; }
        .chart-card:nth-child(4) { animation-delay: 0.4s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chart-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.15);
        }

        .chart-container {
            width: 100%;
            height: 380px;
        }

        /* 小屏：1列 */
        @media (max-width: 900px) {
            .chart-card {
                width: 100%;
                min-width: 0;
                padding: 15px;
            }
            .chart-container {
                height: 300px;
            }
        }

        @media (max-width: 480px) {
            .charts-grid {
                padding: 0 15px 30px;
            }
            .chart-container {
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <article>
        <header>
            <h3>数据图表展示</h3>
        </header>

        <section class="charts-grid">
            <!-- 1. 基础折线图 -->
            <div class="chart-card">
                <div id="basicLine" class="chart-container"></div>
            </div>

            <!-- 2. 堆叠折线图 -->
            <div class="chart-card">
                <div id="stackLine" class="chart-container"></div>
            </div>

            <!-- 3. 区域面积图 -->
            <div class="chart-card">
                <div id="areaChart" class="chart-container"></div>
            </div>

            <!-- 4. 基础饼图 -->
            <div class="chart-card">
                <div id="pieChart" class="chart-container"></div>
            </div>
        </section>
    </article>

    <script>
        /**
         * ECharts图表初始化
         * 包含：折线图、堆叠图、面积图、饼图
         */

        // ========== 基础折线图 ==========
        var basicLine = echarts.init(document.getElementById('basicLine'));
        basicLine.setOption({
            backgroundColor: '#fff',
            title: { text: '2025年上半年月度销售额（万元）', left: 'center' },
            tooltip: { trigger: 'axis' },
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: {
                type: 'category',
                data: ['1月', '2月', '3月', '4月', '5月', '6月']
            },
            yAxis: { type: 'value' },
            series: [{
                name: '销售额',
                type: 'line',
                data: [32, 28, 45, 68, 55, 82],
                lineStyle: { color: '#667eea' },
                itemStyle: { color: '#667eea' },
                smooth: true
            }]
        });

        // ========== 堆叠折线图 ==========
        var stackLine = echarts.init(document.getElementById('stackLine'));
        stackLine.setOption({
            backgroundColor: '#fff',
            title: { text: '各产品线季度收入（万元）', left: 'center' },
            tooltip: { trigger: 'axis' },
            legend: {
                data: ['产品A', '产品B', '产品C'],
                top: '5%',
                right: '10%'
            },
            grid: { left: '3%', right: '4%', bottom: '3%', top: 50, containLabel: true },
            xAxis: {
                type: 'category',
                data: ['Q1', 'Q2', 'Q3', 'Q4']
            },
            yAxis: { type: 'value' },
            series: [
                {
                    name: '产品A', type: 'line', stack: 'Total',
                    data: [20, 30, 45, 55],
                    lineStyle: { color: '#FF6B6B' },
                    itemStyle: { color: '#FF6B6B' }
                },
                {
                    name: '产品B', type: 'line', stack: 'Total',
                    data: [15, 25, 30, 40],
                    lineStyle: { color: '#4ECDC4' },
                    itemStyle: { color: '#4ECDC4' }
                },
                {
                    name: '产品C', type: 'line', stack: 'Total',
                    data: [10, 18, 22, 35],
                    lineStyle: { color: '#FFD166' },
                    itemStyle: { color: '#FFD166' }
                }
            ]
        });

        // ========== 区域面积图 ==========
        var areaChart = echarts.init(document.getElementById('areaChart'));
        areaChart.setOption({
            backgroundColor: '#fff',
            title: { text: '近两年月均气温（℃）', left: 'center' },
            tooltip: { trigger: 'axis' },
            legend: {
                data: ['2024年', '2025年'],
                top: '5%',
                right: '10%'
            },
            grid: { left: '3%', right: '4%', bottom: '3%', top: 50, containLabel: true },
            xAxis: {
                type: 'category',
                boundaryGap: false,
                data: ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月']
            },
            yAxis: { type: 'value' },
            series: [
                {
                    name: '2024年',
                    type: 'line',
                    areaStyle: { color: 'rgba(102, 126, 234, 0.3)' },
                    data: [1, 3, 8, 14, 20, 25, 28, 27, 22, 16, 9, 3],
                    lineStyle: { color: '#667eea' },
                    itemStyle: { color: '#667eea' },
                    smooth: true
                },
                {
                    name: '2025年',
                    type: 'line',
                    areaStyle: { color: 'rgba(255, 107, 107, 0.3)' },
                    data: [0, 4, 10, 16, 22, 28, 31, 30, 24, 18, 11, 5],
                    lineStyle: { color: '#FF6B6B' },
                    itemStyle: { color: '#FF6B6B' },
                    smooth: true
                }
            ]
        });

        // ========== 基础饼图 ==========
        var pieChart = echarts.init(document.getElementById('pieChart'));
        pieChart.setOption({
            backgroundColor: '#fff',
            title: {
                text: '2025年Q4各品类销售占比',
                left: 'center',
                top: '5%'
            },
            tooltip: { trigger: 'item' },
            legend: {
                orient: 'vertical',
                left: 'left',
                data: ['家电', '数码', '服装', '食品', '其他']
            },
            series: [{
                name: '销售占比',
                type: 'pie',
                radius: '55%',
                center: ['55%', '55%'],
                data: [
                    { value: 85, name: '家电', itemStyle: { color: '#667eea' } },
                    { value: 62, name: '数码', itemStyle: { color: '#FF6B6B' } },
                    { value: 48, name: '服装', itemStyle: { color: '#4ECDC4' } },
                    { value: 35, name: '食品', itemStyle: { color: '#FFD166' } },
                    { value: 20, name: '其他', itemStyle: { color: '#95a5a6' } }
                ],
                label: {
                    show: true,
                    formatter: '{b}: {d}%'
                },
                emphasis: {
                    itemStyle: {
                        shadowBlur: 10,
                        shadowOffsetX: 0,
                        shadowColor: 'rgba(0, 0, 0, 0.5)'
                    }
                }
            }]
        });

        // ========== 响应式调整 ==========
        window.addEventListener('resize', function() {
            basicLine.resize();
            stackLine.resize();
            areaChart.resize();
            pieChart.resize();
        });

        window.onload = function() {
            basicLine.resize();
            stackLine.resize();
            areaChart.resize();
            pieChart.resize();
        };
    </script>
</body>
</html>
